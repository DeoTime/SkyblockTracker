<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyBlock Flip Tracker</title>
    <meta name="description" content="Track coins gained from craft-flipping on the Hypixel SkyBlock Auction House." />
    <script>
      // Apply stored theme before first paint so there is no flash.
      try {
        var t = localStorage.getItem('sbft-theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
